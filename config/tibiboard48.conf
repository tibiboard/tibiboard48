# --- Bluetooth強度 ---

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- 電源管理 ---

CONFIG_ZMK_SLEEP=y

# 30秒で浅い眠り（Idle）へ（こまめに休憩させる）
CONFIG_ZMK_IDLE_TIMEOUT=30000

CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# --- 追加の省電力対策 ---
# 外部電力出力をカット（LEDなどを使っていないなら必須）
CONFIG_ZMK_EXT_POWER=n

# ログ機能は絶対OFF（これがONだと隠れ食い虫になる）
CONFIG_ZMK_USB_LOGGING=n

# シリアル通信もOFF（USBをつないだ時の無駄な待機を防ぐ）
CONFIG_SERIAL=n

# --- 機能 ---
# ZMK Studio（キーマップ変更ツール）を使うなら y のままでOK
CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
